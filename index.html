<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunar1ya — Библиотека игр</title>
  <meta name="description" content="Личная библиотека игр Lunar1ya: каталог с фильтрами по статусу, жанру и эпохе." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="moon" aria-hidden="true"></div>

  <header class="site-header">
    <a class="logo" href="#top">
      <span class="logo-mark" aria-hidden="true"></span>
      <span class="logo-text">LUNAR<span class="accent">1</span>YA</span>
    </a>
    <nav class="nav" aria-label="Меню">
      <a href="#library">Библиотека</a>
    </nav>
  </header>

  <!-- Hero + статистика -->
  <section class="hero" id="top">
    <div class="hero-inner">
      <p class="eyebrow">Личная коллекция</p>
      <h1>Библиотека игр</h1>
      <p class="hero-sub">Каталог игр с фильтрами по статусу, жанру и эпохе. Всё под рукой.</p>

      <div class="stats" id="stats">
        <div class="stat"><span class="stat-num" data-stat="total">0</span><span class="stat-label">🎮 Всего игр</span></div>
        <div class="stat"><span class="stat-num" data-stat="playing">0</span><span class="stat-label">⏳ В процессе</span></div>
        <div class="stat"><span class="stat-num" data-stat="done">0</span><span class="stat-label">✅ Пройдено</span></div>
        <div class="stat"><span class="stat-num" data-stat="planned">0</span><span class="stat-label">📌 В планах</span></div>
      </div>
    </div>
  </section>

  <!-- Библиотека -->
  <main class="section" id="library">
    <!-- Фильтры по статусу -->
    <div class="status-bar" id="statusBar" role="tablist" aria-label="Статус">
      <button class="sbtn is-active" data-status="all">🎮 Все игры</button>
      <button class="sbtn" data-status="playing">⏳ В процессе</button>
      <button class="sbtn" data-status="done">✅ Пройдены</button>
      <button class="sbtn" data-status="planned">📌 В планах</button>
      <button class="sbtn" data-status="new">🆕 Не начато</button>
      <button class="sbtn" data-status="mp">🕹️ MP</button>
      <button class="sbtn" data-status="coop">🤝 Coop</button>
    </div>

    <!-- Панель управления -->
    <div class="controls">
      <input type="search" id="search" class="search" placeholder="🔎 Поиск по названию…" aria-label="Поиск" />

      <label class="select-wrap">
        <span class="select-label">Жанр</span>
        <select id="genreFilter" aria-label="Фильтр по жанру"></select>
      </label>

      <label class="select-wrap">
        <span class="select-label">Эпоха</span>
        <select id="eraFilter" aria-label="Фильтр по эпохе">
          <option value="all">Все эпохи</option>
          <option value="new">🔥 Новинки (2024–2026)</option>
          <option value="modern">⚡ Современные (2018–2023)</option>
          <option value="retro">📜 Ретро & Классика (до 2018)</option>
        </select>
      </label>

      <label class="select-wrap">
        <span class="select-label">Сортировка</span>
        <select id="sort" aria-label="Сортировка">
          <option value="title-asc">Название (А → Я)</option>
          <option value="title-desc">Название (Я → А)</option>
          <option value="year-desc">Год (сначала новые)</option>
          <option value="year-asc">Год (сначала старые)</option>
        </select>
      </label>

      <button class="reset" id="reset">✕ Сбросить</button>

      <div class="view-toggle" role="group" aria-label="Вид">
        <button class="vbtn is-active" data-view="grid" aria-label="Сетка">▦ Сетка</button>
        <button class="vbtn" data-view="list" aria-label="Список">☰ Список</button>
      </div>
    </div>

    <p class="result-count" id="resultCount"></p>

    <!-- Сетка/список игр -->
    <div class="games" id="games" data-view="grid"></div>

    <p class="empty" id="empty" hidden>Ничего не найдено. Попробуйте изменить фильтры.</p>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Lunar1ya · Библиотека игр</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
